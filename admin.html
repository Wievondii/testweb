<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理后台 - 小肥画展</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Noto+Serif+SC:wght@300;400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <link rel="stylesheet" href="css/style.css?v=7">
  <link rel="stylesheet" href="css/animations.css?v=1">
</head>
<body class="admin-body">

  <!-- Login Gate -->
  <div class="login-gate" id="loginGate">
    <div class="login-box">
      <h2>管理登录</h2>
      <p>请输入密码管理画廊作品</p>
      <div class="login-error" id="loginError">密码错误</div>
      <input type="password" id="loginPassword" placeholder="请输入密码" autocomplete="current-password">
      <button type="button" class="btn btn-primary" style="width:100%;" id="loginBtn">进入</button>
    </div>
  </div>

  <!-- Admin Panel (hidden until login) -->
  <div id="adminPanel" style="display:none;">

    <!-- Admin Header -->
    <header class="admin-header">
      <h1>作品管理</h1>
      <div class="admin-header-actions">
        <a href="index.html" class="btn btn-sm">查看画廊</a>
        <button type="button" class="btn btn-sm" id="exportBtn">导出 JSON</button>
        <button type="button" class="btn btn-sm" id="importBtn">导入 JSON</button>
        <button type="button" class="btn btn-sm btn-danger" id="logoutBtn">退出登录</button>
      </div>
    </header>

    <main class="admin-content">

      <!-- Gallery Settings -->
      <details style="margin-bottom:2rem; background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:1rem 1.5rem;">
        <summary style="cursor:pointer; font-family:var(--font-display); font-size:1rem; color:var(--text);">画廊设置</summary>
        <div style="margin-top:1rem; display:flex; gap:1rem; flex-wrap:wrap; align-items:flex-end;">
          <div class="form-group" style="flex:1; min-width:200px; margin-bottom:0;">
            <label>画廊标题</label>
            <input type="text" id="cfgTitle" placeholder="小肥画展">
          </div>
          <div class="form-group" style="flex:2; min-width:200px; margin-bottom:0;">
            <label>副标题</label>
            <input type="text" id="cfgSubtitle" placeholder="用光影定格每一个诗意瞬间">
          </div>
          <button type="button" class="btn btn-primary" id="cfgSave" style="height:38px;">保存设置</button>
        </div>
      </details>

      <!-- Upload Zone -->
      <div class="upload-zone" id="uploadZone">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <h3>拖拽图片到此处或点击上传</h3>
        <p>支持 JPG、PNG、WebP 格式 — 自动压缩至 5MB 以下</p>
        <input type="file" id="fileInput" accept="image/*" multiple>
      </div>

      <!-- Compression Info -->
      <div class="compress-info" id="compressInfo">
        <span id="compressOriginal"></span> &rarr; <span id="compressResult"></span>
        <span class="size-change" id="compressSaving"></span>
      </div>

      <!-- Upload Preview & Form -->
      <div class="upload-preview" id="uploadPreview">
        <div class="upload-preview-grid">
          <img class="upload-preview-img" id="previewImg" src="" alt="预览图">
          <div class="upload-preview-form">
            <div class="form-group">
              <label>标题</label>
              <input type="text" id="photoTitle" placeholder="作品标题">
            </div>
            <div class="form-group">
              <label>描述</label>
              <textarea id="photoDesc" placeholder="可选描述"></textarea>
            </div>
            <div class="form-group">
              <label>标签（用逗号分隔）</label>
              <input type="text" id="photoTags" placeholder="人像, 花草, 城市风景">
            </div>
            <div style="display:flex; gap:0.8rem;">
              <button type="button" class="btn btn-primary" id="uploadBtn">上传并保存</button>
              <button type="button" class="btn" id="cancelUpload">取消</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Upload Progress -->
      <div id="uploadProgress" style="display:none; margin-bottom:1.5rem;">
        <div style="background:var(--bg-surface); border-radius:var(--radius); overflow:hidden; height:4px;">
          <div id="progressBar" style="height:100%; background:var(--accent); width:0%; transition:width 0.3s ease;"></div>
        </div>
        <p style="font-size:0.8rem; color:var(--text-muted); margin-top:0.5rem;" id="progressText">正在上传...</p>
      </div>

      <!-- Photo List -->
      <div class="photo-list-header">
        <h2>画廊作品</h2>
        <span class="photo-count" id="photoCount">0 张作品</span>
      </div>

      <div class="photo-grid" id="photoGrid"></div>

    </main>
  </div>

  <!-- Edit Modal -->
  <div class="modal-overlay" id="editModal">
    <div class="modal">
      <h3>编辑作品</h3>
      <div class="form-group">
        <label>标题</label>
        <input type="text" id="editTitle">
      </div>
      <div class="form-group">
        <label>描述</label>
        <textarea id="editDesc"></textarea>
      </div>
      <div class="form-group">
        <label>标签（用逗号分隔）</label>
        <input type="text" id="editTags">
      </div>
      <div class="modal-actions">
        <button type="button" class="btn" id="editCancel">取消</button>
        <button type="button" class="btn btn-primary" id="editSave">保存</button>
      </div>
    </div>
  </div>

  <!-- Delete Confirm Modal -->
  <div class="modal-overlay" id="deleteModal">
    <div class="modal">
      <h3>删除作品</h3>
      <p style="color:var(--text-muted); font-size:0.9rem;">确定要从画廊中删除这张作品吗？图片文件在图床服务器上不会被删除。</p>
      <div class="modal-actions">
        <button type="button" class="btn" id="deleteCancel">取消</button>
        <button type="button" class="btn btn-danger" id="deleteConfirm">删除</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Hidden import input -->
  <input type="file" id="importFile" accept=".json" style="display:none;">

  <script src="js/compressor.js?v=2"></script>
  <script src="js/admin.js?v=3"></script>
</body>
</html>
