<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小肥画展</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Noto+Serif+SC:wght@300;400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <link rel="stylesheet" href="css/style.css?v=7">
  <link rel="stylesheet" href="css/animations.css?v=1">
</head>
<body>

  <!-- Film grain overlay -->
  <div class="grain-overlay"></div>

  <!-- Header -->
  <header class="site-header" id="header">
    <a href="#" class="site-logo">
      <span class="logo-mark">小肥</span><span class="logo-light">画展</span>
    </a>
    <nav class="header-nav">
      <a href="#gallery">画廊</a>
      <span class="nav-divider"></span>
      <a href="admin.html">管理</a>
    </nav>
  </header>

  <!-- Hero -->
  <section class="hero" id="home">
    <canvas id="threeCanvas"></canvas>
    <div class="hero-bg-lines"></div>
    <div class="hero-content">
      <p class="hero-eyebrow">一场印象派的视觉之旅</p>
      <h1 class="hero-title" id="heroTitle">小肥<br>画展</h1>
      <div class="hero-rule"></div>
      <p class="hero-subtitle" id="heroSubtitle">用光影定格每一个诗意瞬间</p>
    </div>
    <div class="hero-scroll-hint">
      <span>向下滑动，探索花园</span>
      <div class="scroll-line"></div>
    </div>
  </section>

  <!-- Filters -->
  <section class="filters-section" id="filtersSection">
    <div class="filters-inner">
      <div class="category-filter" id="categoryFilter">
        <button class="filter-pill active" data-cat="all">
          <span class="pill-label">全部作品</span>
        </button>
        <button class="filter-pill" data-cat="人像">
          <span class="pill-label">人像</span>
          <span class="pill-count" data-count-cat="人像"></span>
        </button>
        <button class="filter-pill" data-cat="花草">
          <span class="pill-label">花草</span>
          <span class="pill-count" data-count-cat="花草"></span>
        </button>
        <button class="filter-pill" data-cat="城市风景">
          <span class="pill-label">城市风景</span>
          <span class="pill-count" data-count-cat="城市风景"></span>
        </button>
        <button class="filter-pill" data-cat="其他">
          <span class="pill-label">其他</span>
          <span class="pill-count" data-count-cat="其他"></span>
        </button>
      </div>
      <div class="tag-filter" id="tagFilter"></div>
    </div>
  </section>

  <!-- Gallery -->
  <section class="gallery" id="gallery">
    <div class="gallery-count" id="galleryCount"></div>
    <div class="masonry" id="masonry"></div>
    <div class="empty-state" id="emptyState" style="display:none;">
      <div class="empty-icon">
        <svg viewBox="0 0 80 80" fill="none" stroke="currentColor" stroke-width="1">
          <rect x="8" y="8" width="64" height="64" rx="2"/>
          <circle cx="28" cy="28" r="6"/>
          <path d="M8 56l18-18 14 14 10-10 22 18"/>
        </svg>
      </div>
      <h3>暂无作品</h3>
      <p>通过管理面板添加照片后，作品将显示在这里。</p>
    </div>
  </section>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <div class="lightbox-backdrop"></div>
    <span class="lightbox-counter" id="lbCounter"></span>
    <button class="lightbox-close" id="lbClose">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <button class="lightbox-nav lightbox-prev" id="lbPrev">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="lightbox-nav lightbox-next" id="lbNext">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="9 6 15 12 9 18"/></svg>
    </button>
    <div class="lightbox-img-wrap">
      <img class="lightbox-img" id="lbImg" src="" alt="">
    </div>
    <div class="lightbox-info">
      <h3 id="lbTitle"></h3>
      <p id="lbDesc"></p>
    </div>
  </div>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="footer-rule"></div>
    <p class="footer-text">&copy; 小肥画展 · 用光影书写诗意</p>
  </footer>

  <script src="js/compressor.js?v=2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="js/three-bg.js?v=2"></script>
  <script src="js/main.js?v=7"></script>
</body>
</html>
