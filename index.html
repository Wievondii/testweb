<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photography Exhibition</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <link rel="stylesheet" href="css/style.css?v=4">
</head>
<body>

  <!-- Header -->
  <header class="site-header" id="header">
    <a href="#" class="site-title"><span>Photo</span>graphy</a>
    <nav class="header-nav">
      <a href="#gallery">Gallery</a>
      <a href="admin.html">Admin</a>
    </nav>
  </header>

  <!-- Hero -->
  <section class="hero" id="home">
    <div class="hero-particles" id="heroParticles"></div>
    <h1 class="hero-title" id="heroTitle">Photography Exhibition</h1>
    <div class="hero-divider"></div>
    <p class="hero-subtitle" id="heroSubtitle">A curated collection of captured moments</p>
  </section>

  <!-- Category Filter -->
  <div class="category-filter" id="categoryFilter">
    <button class="cat-btn active" data-cat="all">全部</button>
    <button class="cat-btn" data-cat="人像">人像</button>
    <button class="cat-btn" data-cat="花草">花草</button>
    <button class="cat-btn" data-cat="城市风景">城市风景</button>
  </div>

  <!-- Tag Filter -->
  <div class="tag-filter" id="tagFilter"></div>

  <!-- Gallery -->
  <section class="gallery" id="gallery">
    <div class="masonry" id="masonry"></div>
    <div class="empty-state" id="emptyState" style="display:none;">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
      <h3>No photos yet</h3>
      <p>Photos will appear here once they are added via the admin panel.</p>
    </div>
  </section>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <span class="lightbox-counter" id="lbCounter"></span>
    <button class="lightbox-close" id="lbClose">&times;</button>
    <button class="lightbox-nav lightbox-prev" id="lbPrev">&#8249;</button>
    <button class="lightbox-nav lightbox-next" id="lbNext">&#8250;</button>
    <img class="lightbox-img" id="lbImg" src="" alt="">
    <div class="lightbox-info">
      <h3 id="lbTitle"></h3>
      <p id="lbDesc"></p>
    </div>
  </div>

  <!-- Footer -->
  <footer class="site-footer">
    <p>&copy; Photography Exhibition &mdash; All rights reserved</p>
  </footer>

  <!-- Film Grain Texture -->
  <div class="film-grain"></div>

  <script src="js/compressor.js?v=2"></script>
  <script src="js/main.js?v=4"></script>
</body>
</html>
